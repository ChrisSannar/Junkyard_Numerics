<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Originalism Searcher — Tex. Const. 1876</title>
<style>
  :root {
    --ink: #1a1712; --paper: #f7f3ea; --card: #fffdf8; --rule: #d8cfbc;
    --accent: #7a2e1d; --accent-soft: #a45341; --muted: #6b6252;
    --support: #2d5a34; --adverse: #8a2f2f; --neutral: #6b6252;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--paper); color: var(--ink);
    font-family: Georgia, 'Times New Roman', serif; line-height: 1.55;
  }
  header {
    border-bottom: 3px double var(--rule); padding: 22px 32px 14px;
    background: var(--card);
  }
  header h1 { margin: 0; font-size: 26px; letter-spacing: .5px; }
  header .sub { color: var(--muted); font-size: 14px; margin-top: 4px; font-style: italic; }
  .layout { display: flex; min-height: calc(100vh - 90px); }
  nav {
    width: 250px; flex: none; border-right: 1px solid var(--rule);
    padding: 16px; background: var(--card); overflow-y: auto; max-height: calc(100vh - 90px);
    position: sticky; top: 0; font-size: 13.5px;
  }
  nav h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin: 10px 0 6px;}
  nav details { margin-bottom: 4px; }
  nav summary { cursor: pointer; font-weight: bold; }
  nav .sec { cursor: pointer; padding: 1px 6px; border-radius: 3px; }
  nav .sec:hover { background: var(--paper); }
  nav .sec.deep { color: var(--accent); font-weight: bold; }
  main { flex: 1; padding: 26px 40px; max-width: 880px; }
  .provision-box {
    background: var(--card); border: 1px solid var(--rule); border-left: 4px solid var(--accent);
    padding: 14px 18px; margin-bottom: 18px; font-size: 15px;
  }
  .provision-box .cite { font-weight: bold; font-variant: small-caps; letter-spacing: .5px; }
  .question { font-style: italic; font-size: 17px; margin: 14px 0 20px; }
  .summary { background: var(--card); border: 1px solid var(--rule); padding: 14px 18px; margin-bottom: 24px; }
  h2.section {
    font-size: 18px; border-bottom: 2px solid var(--rule); padding-bottom: 5px;
    margin-top: 34px; font-variant: small-caps; letter-spacing: 1px;
  }
  .claim {
    margin: 14px 0; padding: 12px 16px; background: var(--card);
    border: 1px solid var(--rule); border-radius: 3px;
  }
  .claim .stance { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
  .stance.supporting { color: var(--support); } .stance.adverse { color: var(--adverse); }
  .stance.neutral { color: var(--neutral); }
  .cites { margin-top: 8px; }
  .cite-chip {
    display: inline-block; font-size: 12px; font-family: ui-monospace, monospace;
    background: var(--paper); border: 1px solid var(--rule); border-radius: 3px;
    padding: 2px 8px; margin: 2px 4px 2px 0; cursor: pointer; color: var(--accent);
  }
  .cite-chip:hover { background: var(--accent); color: var(--card); }
  .methodology { font-size: 13px; color: var(--muted); border-top: 1px dashed var(--rule); margin-top: 36px; padding-top: 14px; }
  /* source viewer */
  #viewer {
    position: fixed; top: 0; right: 0; width: 46%; height: 100vh; background: var(--card);
    border-left: 2px solid var(--accent); box-shadow: -8px 0 30px rgba(0,0,0,.18);
    transform: translateX(105%); transition: transform .25s ease; z-index: 50;
    display: flex; flex-direction: column;
  }
  #viewer.open { transform: translateX(0); }
  #viewer .vhead { padding: 14px 18px; border-bottom: 1px solid var(--rule); display: flex; justify-content: space-between; align-items: baseline; }
  #viewer .vhead b { font-size: 15px; }
  #viewer .vclose { cursor: pointer; font-size: 22px; color: var(--muted); background: none; border: none; }
  #viewer .vbody { flex: 1; overflow-y: auto; padding: 16px 18px; }
  #viewer .ocr {
    white-space: pre-wrap; font-family: ui-monospace, monospace; font-size: 12px;
    background: var(--paper); border: 1px solid var(--rule); padding: 12px; max-height: 40vh; overflow-y: auto;
  }
  #viewer img { max-width: 100%; border: 1px solid var(--rule); margin-top: 12px; }
  #viewer .ocr-note { font-size: 12px; color: var(--muted); font-style: italic; margin: 8px 0; }
  #viewer a { color: var(--accent); }
  mark { background: #f3d9a4; }
  .loading { color: var(--muted); font-style: italic; }
</style>
</head>
<body>
<header>
  <h1>Originalism Searcher</h1>
  <div class="sub">Original public meaning of the Texas Constitution of 1876 — evidence-first, pinpoint-cited</div>
</header>
<div class="layout">
  <nav id="nav"><h3>Constitution of 1876</h3><div class="loading">loading…</div></nav>
  <main id="main"><div class="loading">Loading demo memo…</div></main>
</div>

<div id="viewer">
  <div class="vhead"><b id="v-title">Source</b><button class="vclose" onclick="closeViewer()">×</button></div>
  <div class="vbody" id="v-body"></div>
</div>

<script>
const $ = (s) => document.querySelector(s);
let memoData = null;

async function loadNav() {
  const doc = await (await fetch('/api/constitution')).json();
  const nav = $('#nav');
  nav.innerHTML = '<h3>Constitution of 1876</h3>';
  for (const a of doc.articles) {
    const det = document.createElement('details');
    if (a.key === 'I') det.open = true;
    det.innerHTML = `<summary>Art. ${a.key} — ${a.title}</summary>`;
    for (const s of a.sections) {
      const d = document.createElement('div');
      d.className = 'sec' + (a.key === 'I' && s.num === '17' ? ' deep' : '');
      d.textContent = `§ ${s.num}` + (a.key === 'I' && s.num === '17' ? '  ★ deep analysis' : '');
      d.onclick = () => showProvision(a, s);
      det.appendChild(d);
    }
    nav.appendChild(det);
  }
}

function showProvision(a, s) {
  if (a.key === 'I' && s.num === '17' && memoData) { renderMemo(memoData); return; }
  $('#main').innerHTML = `
    <div class="provision-box">
      <div class="cite">Tex. Const. art. ${a.key}, § ${s.num} (1876) — ${a.title}</div>
      <p>${esc(s.text)}</p>
      <p style="font-size:13px"><a href="${a.url}" target="_blank">source: Tarlton Law Library</a></p>
    </div>
    <p class="loading">Thin path: browse only. Deep evidence analysis is built for Art. I, § 17 — select it in the sidebar.</p>`;
}

function esc(t){ const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

async function loadMemo() {
  try {
    memoData = await (await fetch('/api/memo/demo')).json();
    renderMemo(memoData);
  } catch (e) {
    $('#main').innerHTML = '<p class="loading">Demo memo not built yet — run <code>uv run python -m app.pipeline</code>.</p>';
  }
}

function renderMemo(m) {
  const kindOrder = { semantic: 0, tradition: 1, sentiment: 2 };
  const secs = [...m.sections].sort((a,b)=>kindOrder[a.kind]-kindOrder[b.kind]);
  let html = `
    <div class="provision-box"><div class="cite">${esc(m.provision)}</div></div>
    <div class="question">Q: ${esc(m.question)}</div>
    <div class="summary"><b>Summary.</b> ${esc(m.summary)}</div>`;
  for (const sec of secs) {
    html += `<h2 class="section">${esc(sec.heading)}</h2>`;
    for (const c of sec.claims) {
      const chips = c.evidence_ids.map(id =>
        `<span class="cite-chip" onclick="openEvidence('${id.replace(/'/g,"\\'")}')">${esc(shortId(id))}</span>`).join('');
      html += `<div class="claim">
        <span class="stance ${esc(c.stance)}">${esc(c.stance)}</span>
        <div>${esc(c.text)}</div>
        <div class="cites">${chips}</div>
      </div>`;
    }
    if (!sec.claims.length) html += '<p class="loading">no claims in this section</p>';
  }
  html += `<div class="methodology"><b>Methodology &amp; limitations.</b> ${esc(m.methodology)}</div>`;
  $('#main').innerHTML = html;
}

function shortId(id) {
  const p = id.split(':');
  if (p[0]==='chronam') return `${p[2]} ${p[3]||''}`.trim();
  if (p[0]==='debates') return `Debates ${p[1].replace('_dbt','').replace(/_/g,'-')} ${p[2]}`;
  if (p[0]==='dict') return `${p[1]}: ${p[2]}`;
  return id.slice(0, 28);
}

async function openEvidence(id) {
  const v = $('#viewer'); v.classList.add('open');
  $('#v-title').textContent = 'Loading…';
  $('#v-body').innerHTML = '<p class="loading">fetching source…</p>';
  const r = await fetch('/api/evidence/' + encodeURIComponent(id));
  if (!r.ok) { $('#v-body').innerHTML = '<p>⚠ could not resolve citation</p>'; return; }
  const rec = await r.json();
  $('#v-title').textContent = `${rec.source_name}${rec.date ? ' — ' + rec.date : ''}`;
  let body = '';
  if (rec.ocr_quality_note) body += `<div class="ocr-note">⚠ ${esc(rec.ocr_quality_note)}</div>`;
  body += `<div class="ocr">${esc(rec.text.slice(0, 12000))}</div>`;
  body += `<p><a href="${rec.locator.url}" target="_blank">→ view at the archive${rec.locator.page ? ' (page ' + esc(rec.locator.page) + ')' : ''}</a>`;
  if (rec.locator.detail) body += ` <span class="ocr-note">(${esc(rec.locator.detail)})</span>`;
  body += '</p>';
  if (rec.locator.image_url) body += `<img src="${rec.locator.image_url}" alt="page scan" loading="lazy">`;
  $('#v-body').innerHTML = body;
}
function closeViewer(){ $('#viewer').classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key==='Escape') closeViewer(); });

loadNav(); loadMemo();
</script>
</body>
</html>
